<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRecs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/watchlist.css">
    <link rel="stylesheet" href="css/watched.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/burger.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
      .streaming-providers {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0 1rem 1rem;
        flex-wrap: wrap;
      }
      .streaming-label {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.6);
        margin-right: 0.25rem;
      }
      .streaming-logo {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        object-fit: cover;
      }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="logo">MovieRecs</span>
        <button id="watchlist-toggle">Watchlist<span class="watchlist-count hidden"></span></button>
        <button id="watched-toggle">Watched<span class="watched-count hidden"></span></button>
        <button id="nav-burger" aria-label="Open menu" aria-expanded="false" aria-controls="nav-dropdown">
            <span class="burger-line"></span>
            <span class="burger-line"></span>
            <span class="burger-line"></span>
        </button>
        </nav>
    <div id="nav-dropdown" class="nav-dropdown">
        <button id="nav-watchlist-btn">Watchlist</button>
        <button id="nav-watched-btn">Watched</button>
    </div>

    <div id="watchlist-panel" class="watchlist-panel">
      <div class="watchlist-header">
        <h2>Watchlist</h2>
        <button id="watchlist-close">Close</button>
      </div>
      <p id="watchlist-empty-msg">No movies saved yet.</p>
      <div id="watchlist-grid"></div>
    </div>
    <div id="watchlist-overlay" class="watchlist-overlay"></div>

    <div id="watched-panel" class="watched-panel">
      <div class="watched-header">
        <h2>Watched</h2>
        <button id="watched-close">Close</button>
      </div>
      <p id="watched-empty-msg">No movies marked as watched yet.</p>
      <div id="watched-grid"></div>
    </div>
    <div id="watched-overlay" class="watched-overlay"></div>

    <div id="movie-modal-overlay" class="modal-overlay">
      <div id="movie-modal" class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button id="modal-close" aria-label="Close">Close</button>
        <div id="modal-backdrop" class="modal-backdrop"></div>
        <div class="modal-body">
          <h2 id="modal-title" class="modal-title"></h2>
          <p id="modal-tagline" class="modal-tagline"></p>
          <div class="modal-meta">
            <span id="modal-rating" class="modal-meta-item"></span>
            <span id="modal-year" class="modal-meta-item"></span>
            <span id="modal-runtime" class="modal-meta-item"></span>
          </div>
          <div id="modal-genres" class="modal-genres"></div>
          <p id="modal-overview" class="modal-overview"></p>
          <div class="modal-people">
            <div id="modal-director" class="modal-director"></div>
            <div id="modal-cast" class="modal-cast"></div>
          </div>
          <div id="modal-trailer" class="modal-trailer"></div>
        </div>
      </div>
    </div>

    <section id="mood-section" class="screen active">
        <h1> Whats your current vibe?</h1>
        <div class="mood-grid">
            <button class="mood-card" data-mood="happy">Happy</button>
            <button class="mood-card" data-mood="sad">Sad</button>
            <button class="mood-card" data-mood="excited">Excited</button>
            <button class="mood-card" data-mood="anxious">Anxious</button>
            <button class="mood-card" data-mood="romantic">Romantic</button>
            <button class="mood-card" data-mood="bored">Bored</button>
        </div>
    </section>

    <section id="genre-section" class="screen">
        <h1>Pick a genre</h1>
        <p id="mood-summary">Recommendations based on your mood</p>
        <div class="genre-grid">
            <button class="genre-pill" data-genre-id="28">Action</button>
            <button class="genre-pill" data-genre-id="35">Comedy</button>
            <button class="genre-pill" data-genre-id="18">Drama</button>
            <button class="genre-pill" data-genre-id="27">Horror</button>
            <button class="genre-pill" data-genre-id="10749">Romance</button>
            <button class="genre-pill" data-genre-id="878">Sci-Fi</button>
            <button class="genre-pill" data-genre-id="14">Fantasy</button>
            <button class="genre-pill" data-genre-id="16">Animation</button>
            <button class="genre-pill" data-genre-id="99">Documentary</button>
            <button class="genre-pill" data-genre-id="80">Crime</button>
            <button class="genre-pill" data-genre-id="53">Thriller</button>
            <button class="genre-pill" data-genre-id="10752">War</button>
        </div>
        <button id="back-to-mood">Back</button>
    </section>

    <section id="results-section" class="screen">
        <h1>Your Movie Recommendations</h1><p id="results-summary"></p> <!-- e.g. "Happy + Comedy" -->
        <div id="watched-pool-warning" class="watched-pool-warning"></div>
        <button id="shuffle-btn">Shuffle</button>
        <div id="loading-spinner" class="hidden">Finding your movies...</div>
        <div id="movie-grid" class="movie-grid">
          <!-- Movie cards injected here by app.js -->
        </div>
        <button id="start-over">Start over</button>
      </section>
    
      <script src="js/api.js"></script>
      <script src="js/app.js"></script>
</body>
</html>
